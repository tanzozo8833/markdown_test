name: Jira Gemini Analysis

on:
  repository_dispatch:
    types: [jira-webhook] # Phải khớp với event_type bạn đặt ở Jira Automation

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install jira google-generativeai

      - name: Run Analysis Script
        env:
          # Truyền các secret vào môi trường chạy
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JIRA_SERVER: ${{ secrets.JIRA_SERVER }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          # Lấy Ticket ID từ payload Jira gửi sang
          TICKET_ID: ${{ github.event.client_payload.issue.key }}
        run: python scripts/analyze_ticket.py
